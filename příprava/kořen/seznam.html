        <title>Seznam zpracovaných voleb</title>

        <link rel="apple-touch-icon" sizes="57x57" href="/icons/apple-icon-57x57.png">
        <link rel="apple-touch-icon" sizes="60x60" href="/icons/apple-icon-60x60.png">
        <link rel="apple-touch-icon" sizes="72x72" href="/icons/apple-icon-72x72.png">
        <link rel="apple-touch-icon" sizes="76x76" href="/icons/apple-icon-76x76.png">
        <link rel="apple-touch-icon" sizes="114x114" href="/icons/apple-icon-114x114.png">

        <link rel="apple-touch-icon" sizes="144x144" href="/icons/apple-icon-144x144.png">
        <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-icon-152x152.png">

        <link rel="icon" type="image/png" sizes="96x96" href="/icons/favicon-96x96.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
        <link rel="manifest" href="/icons/manifest.json">
        <meta name="msapplication-TileColor" content="#ffffff">
        <meta name="msapplication-TileImage" content="/icons/ms-icon-144x144.png">
        <meta name="theme-color" content="#ffffff">
        <meta name="color-scheme" content="light dark">
        <link rel="stylesheet" href="menu.css">
        <style>
            * {
                color: light-dark(#212529, white) !important;
                background: light-dark(white, #212529) !important
            }

            html {
                height: 100%;
            }

            body {
                height: inherit;
                position: absolute;
                width: 100%;
            }

            main {
                top: 50px;
                position: relative;
                padding: 2px 10vw;
            }

            h1 {
                margin: 15px 0;
            }

            main a {
                text-decoration: underline;
                color: #41caff !important;
                font-weight: bold;
            }

            h1 {
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <nav>
            <a href="/" style="position: fixed;font-size: 30px;font-weight: bold;left: 50%;transform: translateX(-50%); z-index: 1;">MarkO</a>
            <div style="position: absolute;right: 5px;">
                <a href="/seznam_voleb" target="_blank"><i class="bi bi-list-ul"></i></a> 
                <a href="/info.html" target="_blank"><i class="bi bi-info-circle-fill"></i></a>
            </div>
        </nav>
        <main>
            <h1>Přehled zpracovaných voleb</h1>
            <ul></ul>
            <script>
                const seznam = <%- seznam %>
                const ul = document.querySelector("ul")
                seznam.forEach(element => {
                    polozka = document.createElement("li")
                    odkaz = document.createElement("a")
                    odkaz.href = "volby/" + element
                    odkaz.innerText = element
                    polozka.appendChild(odkaz)
                    ul.appendChild(polozka)
                });
                if(ul.innerHTML == "") {
                    ul.innerText = "Zatím nebyly zpracovány žádné volby."
                    ul.style.padding = "0"
                }
            </script>
        </main>
    </body>
</html>
